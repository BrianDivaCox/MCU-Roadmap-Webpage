<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCU Roadmap v2.3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        .version-tag { position: absolute; top: 10px; left: 20px; color: #45a29e; font-size: 0.8rem; font-family: monospace; opacity: 0.6; }
        h1 { color: #66fcf1; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .movie-card { 
            position: relative; background-color: #1f2833; background-size: cover; background-position: center;
            margin-bottom: 25px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 15px; 
            border-left: 10px solid #444; height: 260px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .card-overlay { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0) 100%); padding: 20px; width: 100%; }
        .movie-card:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(102, 252, 241, 0.5); }
        
        /* Phase Styling */
        .phase-1 { border-left-color: #00bcd4; } .phase-2 { border-left-color: #4caf50; } 
        .phase-3 { border-left-color: #ffeb3b; } .phase-4 { border-left-color: #e91e63; }
        .phase-5 { border-left-color: #9c27b0; } .phase-6 { border-left-color: #009688; }

        .phase-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: #66fcf1; }
        .countdown-badge { position: absolute; top: 15px; right: 15px; background: #f0131e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .modal-content { background-color: #0b0c10; border: 2px solid #45a29e; color: #fff; border-radius: 25px; }
        pre { background: #1c1d22; padding: 20px; border-radius: 15px; color: #66fcf1; white-space: pre-wrap; font-size: 0.85rem; }
        .search-bar { background-color: #1c1d22 !important; color: white !important; border: 1px solid #45a29e !important; border-radius: 30px; }
        .filter-btn { border-radius: 20px; font-weight: bold; min-width: 110px; }
    </style>
</head>
<body>

<div class="version-tag">STABLE_BUILD: v2.3_FULL_RESTORE</div>

<div class="container text-center">
    <h1>MCU Roadmap</h1>
    <div id="counterNote" class="text-info fw-bold mb-3">Timeline Synced: 2008 — 2027</div>

    <div class="row justify-content-center mb-4">
        <div class="col-md-8">
            <input type="text" id="movieSearch" class="form-control search-bar" placeholder="Search title, year, or phase...">
        </div>
    </div>

    <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
        <button class="btn btn-outline-info filter-btn" onclick="filterData('all')">ALL</button>
        <button class="btn btn-outline-info filter-btn" onclick="filterData('Movie')">MOVIES</button>
        <button class="btn btn-outline-info filter-btn" onclick="filterData('Animation')">ANIMATION</button>
    </div>

    <div id="movieGrid" class="row text-start"></div>
</div>

<div class="modal fade" id="movieModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title" id="mTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="mDetails"></pre>
                <div class="text-center mt-3"><a id="mLink" href="#" target="_blank" class="btn btn-danger px-5 rounded-pill fw-bold">WATCH TRAILER</a></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a';
    let mcuData = [];

    async function fetchTimeline() {
        try {
            const pages = [1, 2, 3, 4];
            const results = await Promise.all(pages.map(p => 
                fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_companies=420&sort_by=release_date.asc&page=${p}`).then(r => r.json())
            ));

            const rawList = results.flatMap(r => r.results);
            const today = new Date();

            const promises = rawList.map(async (item) => {
                const dRes = await fetch(`https://api.themoviedb.org/3/movie/${item.id}?api_key=${API_KEY}&append_to_response=videos`);
                const d = await dRes.json();
                
                if (d.runtime < 60 || d.title.includes("Assembled") || d.genres.some(g => g.id === 99)) return null;

                const release = d.release_date ? new Date(d.release_date) : null;
                let phase = "Phase 6"; let pClass = "phase-6";
                if (d.release_date < "2013-05-01") { phase = "Phase 1"; pClass = "phase-1"; }
                else if (d.release_date < "2016-05-01") { phase = "Phase 2"; pClass = "phase-2"; }
                else if (d.release_date < "2019-07-01") { phase = "Phase 3"; pClass = "phase-3"; }
                else if (d.release_date < "2023-01-01") { phase = "Phase 4"; pClass = "phase-4"; }
                else if (d.release_date < "2025-07-25") { phase = "Phase 5"; pClass = "phase-5"; }

                let countdown = "";
                if (release && release > today) {
                    const diff = Math.ceil((release - today) / (1000 * 60 * 60 * 24));
                    countdown = `${diff} DAYS`;
                }

                return {
                    title: d.title,
                    year: release ? release.getFullYear() : "TBD",
                    runtime: `${Math.floor(d.runtime/60)} hours and ${d.runtime%60} mins`,
                    phase: phase, pClass: pClass,
                    poster: `https://image.tmdb.org/t/p/w780${d.backdrop_path}`,
                    summary: d.overview,
                    type: d.genres.some(g => g.name === 'Animation') ? 'Animation' : 'Movie',
                    countdown: countdown,
                    trailer: `https://www.youtube.com/watch?v=${d.videos?.results[0]?.key || ''}`
                };
            });

            mcuData = (await Promise.all(promises)).filter(x => x !== null);
            render(mcuData);
        } catch (e) { console.error(e); }
    }

    function render(list) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        list.forEach((m) => {
            const tag = m.countdown ? `<div class="countdown-badge">${m.countdown}</div>` : "";
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="movie-card ${m.pClass}" style="background-image: url('${m.poster}')" onclick="openDetail('${m.title.replace(/'/g, "\\'")}')">
                        ${tag}
                        <div class="card-overlay">
                            <div class="phase-label">${m.phase}</div>
                            <h4 class="mb-0 text-white">${m.title}</h4>
                            <div class="text-info small">${m.year} • ${m.runtime}</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function filterData(type) {
        if (type === 'all') render(mcuData);
        else render(mcuData.filter(m => m.type === type));
    }

    function openDetail(title) {
        const m = mcuData.find(item => item.title === title);
        const layout = `Movie: ${m.title}\nYear: ${m.year}\nRating: PG-13\nRuntime: ${m.runtime}\n\nSummary: ${m.summary}\nTrailer: ${m.trailer}`;
        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mDetails').innerText = layout;
        document.getElementById('mLink').href = m.trailer;
        new bootstrap.Modal(document.getElementById('movieModal')).show();
    }

    document.getElementById('movieSearch').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        render(mcuData.filter(m => m.title.toLowerCase().includes(val) || m.phase.toLowerCase().includes(val)));
    });

    window.onload = fetchTimeline;
</script>
</body>
</html>
