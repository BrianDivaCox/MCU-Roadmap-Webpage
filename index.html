<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCU Roadmap - Final Build</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        h1 { color: #66fcf1; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        #counterNote { color: #45a29e; font-size: 1.1rem; margin-bottom: 20px; font-weight: bold; }

        .movie-card { 
            position: relative;
            background-color: #1f2833;
            background-size: cover;
            background-position: center;
            border: none; 
            margin-bottom: 25px; 
            cursor: pointer; 
            transition: 0.4s; 
            border-radius: 15px; 
            border-left: 10px solid #444;
            height: 260px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .card-overlay {
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0) 100%);
            padding: 20px;
            width: 100%;
        }

        .movie-card:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(102, 252, 241, 0.4); }
        
        /* Phase Colors */
        .phase-1 { border-left-color: #00bcd4; } .phase-2 { border-left-color: #4caf50; } 
        .phase-3 { border-left-color: #ffeb3b; } .phase-4 { border-left-color: #e91e63; }
        .phase-5 { border-left-color: #9c27b0; } .phase-6 { border-left-color: #009688; }

        .phase-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: #66fcf1; }
        .countdown-badge { position: absolute; top: 15px; right: 15px; background: #f0131e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .type-badge { font-size: 0.6rem; background: rgba(102, 252, 241, 0.2); color: #66fcf1; padding: 2px 8px; border-radius: 10px; margin-left: 10px; }
        
        .modal-content { background-color: #1c1d22; border: 1px solid #45a29e; color: #fff; border-radius: 20px; }
        pre { background: #000; padding: 25px; border-radius: 12px; color: #00ffcc; white-space: pre-wrap; border: 1px solid #333; font-family: 'Courier New', monospace; font-size: 0.95rem; }
        .search-bar { background-color: #1c1d22 !important; color: white !important; border: 1px solid #45a29e !important; border-radius: 30px; }
        .filter-btn { border-radius: 20px; font-weight: bold; border-width: 2px; }
    </style>
</head>
<body>

<div class="container text-center">
    <h1>MCU Roadmap</h1>
    <div id="counterNote">Initializing Database...</div>

    <div class="row justify-content-center mb-3">
        <div class="col-md-8">
            <input type="text" id="movieSearch" class="form-control search-bar" placeholder="Search movies, years, or phases...">
        </div>
    </div>

    <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
        <button class="btn btn-outline-info filter-btn" onclick="filterData('all')">ALL</button>
        <button class="btn btn-outline-info filter-btn" onclick="filterData('Movie')">THEATRICAL FILMS</button>
        <button class="btn btn-outline-info filter-btn" onclick="filterData('Animation')">CARTOONS</button>
        <button id="updateBtn" class="btn btn-info filter-btn" onclick="syncWithTMDB()">⚡ REFRESH</button>
    </div>

    <div class="spinner-border text-info mb-4" role="status" id="loader" style="display:none;"></div>
    <div id="movieGrid" class="row text-start"></div>
</div>

<div class="modal fade" id="movieModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title" id="mTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="mDetails"></pre>
                <div class="text-center mt-3 mb-2">
                    <a id="mLink" href="#" target="_blank" class="btn btn-danger px-5 rounded-pill fw-bold">WATCH TRAILER</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a'; 
    const MARVEL_STUDIOS_ID = '420'; 
    let mcuData = [];

    async function syncWithTMDB() {
        const loader = document.getElementById('loader');
        const counterNote = document.getElementById('counterNote');
        loader.style.display = "inline-block";
        counterNote.innerText = "Cleaning Archives (Filtering Documentaries)...";

        try {
            let allItems = [];
            for (let i = 1; i <= 5; i++) {
                const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_companies=${MARVEL_STUDIOS_ID}&page=${i}&sort_by=release_date.asc`);
                const data = await res.json();
                if (data.results) allItems = [...allItems, ...data.results];
            }

            const today = new Date();

            const promises = allItems.map(async (item) => {
                const detailRes = await fetch(`https://api.themoviedb.org/3/movie/${item.id}?api_key=${API_KEY}&append_to_response=videos`);
                const d = await detailRes.json();
                
                // --- STEP 1: BLOCK THE "MAKING OF" CONTENT ---
                const title = d.title;
                const blacklist = ["Making of", "Assembled", "Special", "Marvel Studios'"];
                const isDocumentary = blacklist.some(word => title.includes(word));
                if (isDocumentary && !title.includes("Avengers")) return null; // Guard against skipping Avengers movies

                const release = d.release_date ? new Date(d.release_date) : null;
                
                // Phase Logic
                let phase = "Phase Six"; let pCode = "phase-6";
                if (d.release_date < "2013-01-01") { phase = "Phase One"; pCode = "phase-1"; }
                else if (d.release_date < "2016-01-01") { phase = "Phase Two"; pCode = "phase-2"; }
                else if (d.release_date < "2020-01-01") { phase = "Phase Three"; pCode = "phase-3"; }
                else if (d.release_date < "2023-01-01") { phase = "Phase Four"; pCode = "phase-4"; }
                else if (d.release_date < "2025-05-01") { phase = "Phase Five"; pCode = "phase-5"; }

                // Countdown
                let countdown = "";
                if (release && release > today) {
                    const days = Math.ceil((release - today) / (1000 * 60 * 60 * 24));
                    countdown = `${days} DAYS`;
                }

                const isAnimation = d.genres.some(g => g.name === 'Animation');
                const trailer = d.videos?.results?.find(v => v.type === 'Trailer');
                const poster = d.backdrop_path ? `https://image.tmdb.org/t/p/w780${d.backdrop_path}` : '';

                return {
                    title: title,
                    year: release ? release.getFullYear() : "TBD",
                    rating: "PG-13",
                    runtime: d.runtime ? `${Math.floor(d.runtime/60)} hours and ${d.runtime%60} mins` : "TBD",
                    genres: d.genres.map(g => g.name).join(", "),
                    source: isAnimation ? "Disney+ (Animation)" : "Theaters",
                    summary: d.overview,
                    phase: phase,
                    pCode: pCode,
                    poster: poster,
                    type: isAnimation ? 'Animation' : 'Movie',
                    countdown: countdown,
                    trailer: trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : "N/A"
                };
            });

            // Filter out the nulls (documentaries) we blocked
            mcuData = (await Promise.all(promises)).filter(item => item !== null);
            
            // Clean duplicates
            mcuData = mcuData.filter((v,i,a)=>a.findIndex(t=>(t.title === v.title))===i);
            mcuData.sort((a, b) => (a.year === "TBD" ? 1 : b.year === "TBD" ? -1 : a.year - b.year));
            
            render(mcuData);
            loader.style.display = "none";
        } catch (err) {
            console.error(err);
            loader.style.display = "none";
        }
    }

    function render(list) {
        const grid = document.getElementById('movieGrid');
        const counter = document.getElementById('counterNote');
        grid.innerHTML = '';
        counter.innerHTML = `DATABASE ONLINE: <strong>${list.length} CORE PROJECTS FOUND</strong>`;

        list.forEach((m) => {
            const countTag = m.countdown ? `<div class="countdown-badge">🚀 ${m.countdown}</div>` : "";
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="movie-card ${m.pCode}" style="background-image: url('${m.poster}')" onclick="openDetail('${m.title.replace(/'/g, "\\'")}')">
                        ${countTag}
                        <div class="card-overlay">
                            <div class="phase-label">${m.phase} <span class="type-badge">${m.type}</span></div>
                            <h4 class="mb-0 text-white">${m.title}</h4>
                            <div class="text-info small">${m.year}</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function filterData(category) {
        if (category === 'all') render(mcuData);
        else render(mcuData.filter(m => m.type === category));
    }

    function openDetail(title) {
        const m = mcuData.find(item => item.title === title);
        const layout = `Movie: ${m.title}\nYear: ${m.year}\nRating: ${m.rating}\nRuntime: ${m.runtime}\nGenres: ${m.genres}\nSource: ${m.source}\n\nSummary: ${m.summary}\nTrailer: ${m.trailer}`;
        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mDetails').innerText = layout;
        document.getElementById('mLink').href = m.trailer;
        new bootstrap.Modal(document.getElementById('movieModal')).show();
    }

    document.getElementById('movieSearch').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        render(mcuData.filter(m => m.title.toLowerCase().includes(val) || m.year.toString().includes(val)));
    });

    window.onload = syncWithTMDB;
</script>
</body>
</html>
