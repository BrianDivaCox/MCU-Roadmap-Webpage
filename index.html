<script>
    const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a'; 
    const COLLECTION_ID = '86263'; // Official MCU Collection ID (Contains all 40+ movies)

    async function syncWithTMDB() {
        const btn = document.getElementById('updateBtn');
        btn.innerText = "SYNCING ALL 40+ MOVIES...";
        btn.disabled = true;

        try {
            // 1. Fetch the entire MCU Collection
            const collRes = await fetch(`https://api.themoviedb.org/3/collection/${COLLECTION_ID}?api_key=${API_KEY}`);
            const collData = await collRes.json();
            
            // 2. Map through EVERY movie in the collection (no 20-movie limit here)
            const moviePromises = collData.parts.map(async (item) => {
                const detailRes = await fetch(`https://api.themoviedb.org/3/movie/${item.id}?api_key=${API_KEY}&append_to_response=videos`);
                const d = await detailRes.json();
                
                // Determine Phase based on Release Date
                let phase = "Phase Six"; let pCode = "phase-6";
                if (d.release_date < "2013-01-01") { phase = "Phase One"; pCode = "phase-1"; }
                else if (d.release_date < "2016-01-01") { phase = "Phase Two"; pCode = "phase-2"; }
                else if (d.release_date < "2020-01-01") { phase = "Phase Three"; pCode = "phase-3"; }
                else if (d.release_date < "2023-01-01") { phase = "Phase Four"; pCode = "phase-4"; }
                else if (d.release_date < "2025-05-01") { phase = "Phase Five"; pCode = "phase-5"; }

                const trailer = d.videos.results.find(v => v.type === 'Trailer');

                return {
                    title: d.title,
                    year: d.release_date ? new Date(d.release_date).getFullYear() : "TBD",
                    rating: "PG-13",
                    runtime: formatTime(d.runtime),
                    genres: d.genres.map(g => g.name).join(", "),
                    source: "Disney+ / Theaters",
                    summary: d.overview,
                    phase: phase,
                    pCode: pCode,
                    trailer: trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : "N/A"
                };
            });

            mcuData = await Promise.all(moviePromises);
            
            // Sort by Year (Oldest to Newest looks best for a roadmap)
            mcuData.sort((a, b) => {
                if (a.year === "TBD") return 1;
                if (b.year === "TBD") return -1;
                return a.year - b.year;
            });

            render(mcuData);
            btn.innerText = "UPDATE DATABASE";
            btn.disabled = false;
        } catch (error) {
            btn.innerText = "SYNC ERROR";
            btn.disabled = false;
        }
    }
    // ... rest of your render and openDetail functions stay the same ...
</script>
