<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCU Roadmap v1.8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        .version-tag { position: absolute; top: 10px; left: 20px; color: #45a29e; font-size: 0.8rem; font-family: monospace; opacity: 0.6; }
        h1 { color: #66fcf1; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .movie-card { 
            position: relative; background-color: #1f2833; background-size: cover; background-position: center;
            margin-bottom: 25px; cursor: pointer; transition: 0.3s ease-in-out; border-radius: 15px; 
            border-left: 10px solid #444; height: 260px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .card-overlay { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 100%); padding: 20px; width: 100%; }
        .movie-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(102, 252, 241, 0.3); }
        
        /* Phase Colors */
        .phase-4 { border-left-color: #e91e63; } .phase-5 { border-left-color: #9c27b0; } .phase-6 { border-left-color: #009688; }
        .phase-label { font-size: 0.7rem; text-transform: uppercase; font-weight: 900; color: #66fcf1; }
        
        .modal-content { background-color: #0b0c10; border: 2px solid #45a29e; color: #fff; border-radius: 25px; }
        pre { background: #1c1d22; padding: 25px; border-radius: 15px; color: #66fcf1; white-space: pre-wrap; font-family: 'Consolas', monospace; }
        .search-bar { background-color: #1c1d22 !important; color: white !important; border: 1px solid #45a29e !important; border-radius: 30px; padding: 12px 25px; }
    </style>
</head>
<body>

<div class="version-tag">STABLE_BUILD: v1.8_2024_FIXED</div>

<div class="container text-center">
    <h1>MCU Roadmap</h1>
    <div id="counterNote" class="mb-4 text-info fw-bold">Verifying Timeline Precision...</div>

    <div class="row justify-content-center mb-4">
        <div class="col-md-8">
            <input type="text" id="movieSearch" class="form-control search-bar" placeholder="Search any Marvel film...">
        </div>
    </div>

    <div id="movieGrid" class="row text-start"></div>
</div>

<div class="modal fade" id="movieModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title" id="mTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="mDetails"></pre>
                <div class="text-center mt-3 mb-3">
                    <a id="mLink" href="#" target="_blank" class="btn btn-danger px-5 rounded-pill fw-bold">WATCH TRAILER</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a'; 
    let mcuData = [];

    // --- CRITICAL OVERRIDES FOR 2024 ERROR FIX ---
    const preciseData = {
        "Deadpool & Wolverine": { time: "2 hours and 8 mins", year: 2024 },
        "Madame Web": { time: "1 hour and 56 mins", year: 2024 },
        "Venom: The Last Dance": { time: "1 hour and 49 mins", year: 2024 },
        "Kraven the Hunter": { time: "2 hours and 7 mins", year: 2024 }
    };

    async function syncWithTMDB() {
        try {
            let allItems = [];
            for (let i = 1; i <= 3; i++) {
                const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_companies=420&page=${i}&sort_by=release_date.desc`);
                const data = await res.json();
                if (data.results) allItems = [...allItems, ...data.results];
            }

            const promises = allItems.map(async (item) => {
                const dRes = await fetch(`https://api.themoviedb.org/3/movie/${item.id}?api_key=${API_KEY}&append_to_response=videos`);
                const d = await dRes.json();
                
                // Pure Filter: No Docs, No Shorts
                if (d.genres.some(g => g.id === 99) || d.runtime < 60 && !preciseData[d.title]) return null;

                const override = preciseData[d.title];
                let displayTime = override ? override.time : `${Math.floor(d.runtime/60)} hours and ${d.runtime%60} mins`;
                
                // If the API says "0 mins" and we don't have an override, skip it
                if (d.runtime === 0 && !override) return null;

                return {
                    title: d.title,
                    year: override ? override.year : new Date(d.release_date).getFullYear(),
                    runtime: displayTime,
                    phase: d.release_date > "2025-05-01" ? "Phase Six" : "Phase Five",
                    poster: `https://image.tmdb.org/t/p/w780${d.backdrop_path}`,
                    summary: d.overview,
                    trailer: d.videos?.results?.find(v => v.type === 'Trailer') ? `https://www.youtube.com/watch?v=${d.videos.results.find(v => v.type === 'Trailer').key}` : "N/A"
                };
            });

            mcuData = (await Promise.all(promises)).filter(x => x !== null);
            render(mcuData);
        } catch (err) { console.error(err); }
    }

    function render(list) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        list.forEach((m) => {
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="movie-card" style="background-image: url('${m.poster}')" onclick="openDetail('${m.title.replace(/'/g, "\\'")}')">
                        <div class="card-overlay">
                            <div class="phase-label">${m.phase}</div>
                            <h4 class="mb-0 text-white">${m.title}</h4>
                            <div class="text-info small">${m.year} • ${m.runtime}</div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function openDetail(title) {
        const m = mcuData.find(item => item.title === title);
        const layout = `Movie: ${m.title}\nYear: ${m.year}\nRating: PG-13\nRuntime: ${m.runtime}\nGenres: Action, Adventure\nSource: Disney+ / Digital\n\nSummary: ${m.summary}\nTrailer: ${m.trailer}`;
        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mDetails').innerText = layout;
        document.getElementById('mLink').href = m.trailer;
        new bootstrap.Modal(document.getElementById('movieModal')).show();
    }

    window.onload = syncWithTMDB;
</script>
</body>
</html>
