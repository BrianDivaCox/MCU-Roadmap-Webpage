<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCU Roadmap v2.7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        .version-tag { position: absolute; top: 10px; left: 20px; color: #45a29e; font-size: 0.8rem; font-family: monospace; opacity: 0.6; }
        h1 { color: #66fcf1; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .movie-card { 
            position: relative; background-color: #1f2833; background-size: cover; background-position: center;
            margin-bottom: 25px; cursor: pointer; transition: 0.3s; border-radius: 15px; 
            border-left: 10px solid #444; height: 280px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .card-overlay { background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 85%, rgba(0,0,0,0) 100%); padding: 20px; width: 100%; }
        .movie-card:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(102, 252, 241, 0.3); }
        
        /* Phase Border Colors */
        .phase-1 { border-left-color: #00bcd4; } .phase-2 { border-left-color: #4caf50; } 
        .phase-3 { border-left-color: #ffeb3b; } .phase-4 { border-left-color: #e91e63; }
        .phase-5 { border-left-color: #9c27b0; } .phase-6 { border-left-color: #009688; }

        .phase-info { font-size: 0.75rem; text-transform: uppercase; font-weight: 900; color: #66fcf1; letter-spacing: 1px; margin-bottom: 4px; }
        .countdown-badge { position: absolute; top: 15px; right: 15px; background: #f0131e; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; z-index: 10; box-shadow: 0 0 10px rgba(240, 19, 30, 0.5); }
        
        .search-bar { background-color: #1c1d22 !important; color: white !important; border: 1px solid #45a29e !important; border-radius: 30px; height: 55px; font-size: 1.1rem; }
        .btn-check:checked + .btn-outline-info { background-color: #66fcf1; color: #0b0c10; border-color: #66fcf1; }
        .modal-content { background-color: #0b0c10; border: 2px solid #45a29e; color: #fff; border-radius: 25px; }
        pre { background: #1c1d22; padding: 20px; border-radius: 15px; color: #66fcf1; white-space: pre-wrap; font-size: 0.9rem; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="version-tag">STABLE_BUILD: v2.7_CHRONO_VISION</div>
<div class="container text-center">
    <h1>MCU Roadmap</h1>
    
    <div class="row justify-content-center mt-4 mb-4">
        <div class="col-md-10">
            <input type="text" id="movieSearch" class="form-control search-bar" placeholder="Search name, phase, or year...">
        </div>
    </div>

    <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
        <input type="radio" class="btn-check" name="filter" id="all" checked onclick="updateUI()">
        <label class="btn btn-outline-info rounded-pill px-4 fw-bold" for="all">ALL</label>

        <input type="radio" class="btn-check" name="filter" id="Movie" onclick="updateUI()">
        <label class="btn btn-outline-info rounded-pill px-4 fw-bold" for="Movie">MOVIES</label>

        <input type="radio" class="btn-check" name="filter" id="Animation" onclick="updateUI()">
        <label class="btn btn-outline-info rounded-pill px-4 fw-bold" for="Animation">ANIMATION</label>

        <input type="radio" class="btn-check" name="filter" id="Upcoming" onclick="updateUI()">
        <label class="btn btn-outline-danger rounded-pill px-4 fw-bold" for="Upcoming">UPCOMING 🚀</label>
    </div>

    <div id="movieGrid" class="row text-start"></div>
</div>

<div class="modal fade" id="movieModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content p-3">
            <div class="modal-header border-0">
                <h3 class="modal-title fw-bold" id="mTitle"></h3>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="mDetails"></pre>
                <div class="text-center mt-4"><a id="mLink" href="#" target="_blank" class="btn btn-danger btn-lg px-5 rounded-pill fw-bold">WATCH TRAILER</a></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a';
    let mcuData = [];
    const today = new Date("2026-03-27");

    async function initDatabase() {
        try {
            const pages = [1, 2, 3, 4, 5];
            const responses = await Promise.all(pages.map(p => 
                fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_companies=420&sort_by=release_date.asc&page=${p}`).then(r => r.json())
            ));

            const rawList = responses.flatMap(r => r.results);

            const promises = rawList.map(async (item) => {
                const dRes = await fetch(`https://api.themoviedb.org/3/movie/${item.id}?api_key=${API_KEY}&append_to_response=videos`);
                const d = await dRes.json();
                
                const release = d.release_date ? new Date(d.release_date) : null;
                const isUpcoming = release && release > today;
                
                if (!isUpcoming && d.runtime < 60) return null;
                if (d.title.includes("Assembled") || d.genres.some(g => g.id === 99)) return null;

                let phase = "Phase 6"; let pClass = "phase-6";
                if (d.release_date < "2013-05-01") { phase = "Phase 1"; pClass = "phase-1"; }
                else if (d.release_date < "2016-05-01") { phase = "Phase 2"; pClass = "phase-2"; }
                else if (d.release_date < "2019-07-01") { phase = "Phase 3"; pClass = "phase-3"; }
                else if (d.release_date < "2023-01-01") { phase = "Phase 4"; pClass = "phase-4"; }
                else if (d.release_date < "2025-07-25") { phase = "Phase 5"; pClass = "phase-5"; }

                let countdown = "";
                if (isUpcoming) {
                    const diff = Math.ceil((release - today) / (1000 * 60 * 60 * 24));
                    countdown = `${diff} DAYS`;
                }

                return {
                    id: d.id,
                    title: d.title,
                    year: release ? release.getFullYear() : "TBD",
                    runtime: d.runtime > 0 ? `${Math.floor(d.runtime/60)} hours and ${d.runtime%60} mins` : "TBA",
                    phase: phase, pClass: pClass,
                    poster: `https://image.tmdb.org/t/p/w780${d.backdrop_path || d.poster_path}`,
                    summary: d.overview,
                    type: d.genres.some(g => g.name === 'Animation') ? 'Animation' : 'Movie',
                    isUpcoming: isUpcoming,
                    countdown: countdown,
                    trailer: `https://www.youtube.com/watch?v=${d.videos?.results[0]?.key || ''}`
                };
            });

            mcuData = (await Promise.all(promises)).filter(x => x !== null);
            updateUI();
        } catch (e) { console.error(e); }
    }

    function updateUI() {
        const query = document.getElementById('movieSearch').value.toLowerCase();
        const activeFilter = document.querySelector('input[name="filter"]:checked').id;
        
        const filtered = mcuData.filter(m => {
            const matchesSearch = m.title.toLowerCase().includes(query) || m.phase.toLowerCase().includes(query) || m.year.toString().includes(query);
            let matchesType = true;
            if (activeFilter === 'Movie') matchesType = (m.type === 'Movie');
            if (activeFilter === 'Animation') matchesType = (m.type === 'Animation');
            if (activeFilter === 'Upcoming') matchesType = m.isUpcoming;
            
            return matchesSearch && matchesType;
        });

        render(filtered);
    }

    function render(list) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        list.forEach((m) => {
            const tag = m.countdown ? `<div class="countdown-badge">🚀 ${m.countdown}</div>` : "";
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="movie-card ${m.pClass}" style="background-image: url('${m.poster}')" onclick="openDetail(${m.id})">
                        ${tag}
                        <div class="card-overlay">
                            <div class="phase-info">${m.phase} • ${m.year}</div>
                            <h4 class="mb-0 text-white fw-bold">${m.title}</h4>
                        </div>
                    </div>
                </div>`;
        });
    }

    function openDetail(id) {
        const m = mcuData.find(item => item.id === id);
        const layout = `Movie: ${m.title}\nYear: ${m.year}\nRating: PG-13\nRuntime: ${m.runtime}\nGenres: ${m.type}\nSource: Disney+ / Theater\n\nSummary: ${m.summary}\nTrailer: ${m.trailer}`;
        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mDetails').innerText = layout;
        document.getElementById('mLink').href = m.trailer;
        new bootstrap.Modal(document.getElementById('movieModal')).show();
    }

    document.getElementById('movieSearch').addEventListener('input', updateUI);
    window.onload = initDatabase;
</script>
</body>
</html>
