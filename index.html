<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCU Roadmap - Card Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f1014; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        .container { max-width: 1000px; }
        
        h1 { color: #f0131e; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        #counterNote { color: #888; font-size: 1rem; margin-bottom: 30px; }

        /* Search & Sync Bar */
        .control-panel { background: #1c1d22; padding: 20px; border-radius: 15px; margin-bottom: 40px; border: 1px solid #333; }
        .search-bar { background-color: #0f1014; border: 1px solid #444; color: #fff; border-radius: 8px; }
        .search-bar:focus { background-color: #16171d; color: #fff; border-color: #f0131e; box-shadow: none; }

        /* Card Styling */
        .movie-card { 
            background: #1c1d22; 
            border: none; 
            margin-bottom: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
            border-radius: 12px; 
            border-left: 8px solid #444; 
            height: 100%;
        }
        .movie-card:hover { transform: translateY(-5px); background: #25262c; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        /* Phase Colors from your Image */
        .phase-1 { border-left-color: #00bcd4; } /* Blue */
        .phase-2 { border-left-color: #4caf50; } /* Green */
        .phase-3 { border-left-color: #ffeb3b; } /* Yellow */
        .phase-4 { border-left-color: #e91e63; } /* Pink */
        .phase-5 { border-left-color: #9c27b0; } /* Purple */
        .phase-6 { border-left-color: #009688; } /* Teal */

        .phase-tag { font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: #aaa; margin-bottom: 5px; display: block; }
        
        /* Modal Styling */
        .modal-content { background-color: #1c1d22; border: 1px solid #444; color: #fff; border-radius: 20px; }
        pre { 
            background: #000; 
            padding: 25px; 
            border-radius: 12px; 
            color: #00ffcc; 
            border: 1px solid #333; 
            white-space: pre-wrap; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 0.95rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <h1>MCU Roadmap</h1>
    <div id="counterNote">Initializing Database...</div>

    <div class="control-panel d-flex flex-column flex-md-row gap-3">
        <input type="text" id="movieSearch" class="form-control form-control-lg search-bar" placeholder="Search titles, years, or phases...">
        <button id="updateBtn" class="btn btn-danger fw-bold px-4" onclick="syncWithTMDB()">UPDATE DATABASE</button>
    </div>

    <div id="movieGrid" class="row text-start">
        </div>
</div>

<div class="modal fade" id="movieModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="mTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-0">
                <pre id="mDetails"></pre>
                <div class="text-center mt-3 mb-3">
                    <a id="mLink" href="#" target="_blank" class="btn btn-primary px-5 rounded-pill">Watch Official Trailer</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a'; // <--- ADD YOUR KEY HERE
    const LIST_ID = '8254729'; // Comprehensive MCU List
    let mcuData = [];

    // Helper for your specific layout requirements
    function formatTime(minutes) {
        if (!minutes) return "TBD";
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        return `${h} ${h === 1 ? 'hour' : 'hours'} and ${m} mins`;
    }

    async function syncWithTMDB() {
        const btn = document.getElementById('updateBtn');
        btn.innerText = "SYNCING...";
        btn.disabled = true;

        try {
            const listRes = await fetch(`https://api.themoviedb.org/3/list/${LIST_ID}?api_key=${API_KEY}`);
            const listData = await listRes.json();
            
            const moviePromises = listData.items.map(async (item) => {
                const detailRes = await fetch(`https://api.themoviedb.org/3/movie/${item.id}?api_key=${API_KEY}&append_to_response=videos,release_dates`);
                const d = await detailRes.json();
                
                // Logic to determine Phase based on date
                let phase = "Phase Six";
                let pCode = "phase-6";
                if (d.release_date < "2013-01-01") { phase = "Phase One"; pCode = "phase-1"; }
                else if (d.release_date < "2016-01-01") { phase = "Phase Two"; pCode = "phase-2"; }
                else if (d.release_date < "2020-01-01") { phase = "Phase Three"; pCode = "phase-3"; }
                else if (d.release_date < "2023-01-01") { phase = "Phase Four"; pCode = "phase-4"; }
                else if (d.release_date < "2025-05-01") { phase = "Phase Five"; pCode = "phase-5"; }

                const trailer = d.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');

                return {
                    title: d.title,
                    year: d.release_date ? new Date(d.release_date).getFullYear() : "TBD",
                    rating: "PG-13", // Simplification
                    runtime: formatTime(d.runtime),
                    genres: d.genres.map(g => g.name).join(", "),
                    source: "Disney+ / Theaters",
                    summary: d.overview,
                    phase: phase,
                    pCode: pCode,
                    trailer: trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : "N/A"
                };
            });

            mcuData = await Promise.all(moviePromises);
            mcuData.sort((a, b) => b.year - a.year); // Newest first for cards
            render(mcuData);
            btn.innerText = "UPDATE DATABASE";
            btn.disabled = false;
        } catch (error) {
            btn.innerText = "ERROR - CHECK API";
            btn.disabled = false;
        }
    }

    function render(list) {
        const grid = document.getElementById('movieGrid');
        const counter = document.getElementById('counterNote');
        grid.innerHTML = '';
        counter.innerHTML = `There are currently <strong>${list.length} movies</strong> tracked in the MCU database.`;

        list.forEach((m) => {
            grid.innerHTML += `
                <div class="col-md-6 col-lg-4">
                    <div class="movie-card p-4 ${m.pCode}" onclick="openDetail('${m.title.replace(/'/g, "\\'")}')">
                        <span class="phase-tag">${m.phase}</span>
                        <h4 class="mb-1">${m.title}</h4>
                        <p class="text-secondary mb-0">${m.year}</p>
                    </div>
                </div>`;
        });
    }

    function openDetail(title) {
        const m = mcuData.find(item => item.title === title);
        const layout = `Movie: ${m.title}
Year: ${m.year}
Rating: ${m.rating}
Runtime: ${m.runtime}
Genres: ${m.genres}
Source: ${m.source}

Summary: ${m.summary}
Trailer: ${m.trailer}`;
        
        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mDetails').innerText = layout;
        document.getElementById('mLink').href = m.trailer;
        new bootstrap.Modal(document.getElementById('movieModal')).show();
    }

    document.getElementById('movieSearch').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        render(mcuData.filter(m => m.title.toLowerCase().includes(val) || m.year.toString().includes(val) || m.phase.toLowerCase().includes(val)));
    });

    // Auto-load on start
    syncWithTMDB();
</script>
</body>
</html>
