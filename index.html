<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCU Live Database</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', sans-serif; padding: 40px 0; }
        .container { max-width: 900px; }
        .header-section { border-bottom: 2px solid #1f2833; margin-bottom: 30px; padding-bottom: 20px; }
        h1 { color: #66fcf1; font-weight: 800; text-transform: uppercase; margin: 0; }
        
        .sync-panel { background: #1f2833; padding: 15px; border-radius: 12px; margin-bottom: 30px; }
        .movie-card { background: #1f2833; border: none; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-radius: 8px; border-left: 5px solid #66fcf1; }
        .movie-card:hover { transform: translateX(10px); background: #45a29e; color: #0b0c10; }
        
        pre { background: #000; padding: 20px; border-radius: 10px; color: #66fcf1; white-space: pre-wrap; border: 1px solid #45a29e; text-align: left; }
        .modal-content { background-color: #0b0c10; color: #fff; border: 1px solid #45a29e; border-radius: 15px; }
        .loading-spinner { display: none; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="header-section">
        <h1>MCU Intelligence Hub</h1>
        <p id="counterNote" class="mt-2">Connecting to Neural Link...</p>
    </div>

    <div class="sync-panel d-flex justify-content-between align-items-center">
        <input type="text" id="movieSearch" class="form-control bg-dark text-white border-0 w-50" placeholder="Filter roadmap...">
        <button id="updateBtn" class="btn btn-info fw-bold" onclick="syncWithTMDB()">
            <span class="spinner-border spinner-border-sm loading-spinner" id="spinner"></span>
            🔄 SYNC LIVE DATA
        </button>
    </div>

    <div id="movieGrid" class="text-start"></div>
</div>

<div class="modal fade" id="movieModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="mTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body pt-0 text-center">
                <pre id="mDetails"></pre>
                <a id="mLink" href="#" target="_blank" class="btn btn-outline-info mt-3 px-5">Watch on YouTube</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_KEY = 'ab209bae2d49ee12d5a1f8601c11ef6a'; // PASTE YOUR KEY HERE
    const LIST_ID = '8254729'; // Dynamic MCU List ID (or use 86263 for collection)
    let mcuData = [];

    // Format Runtime: Minutes -> "X hours and Y mins"
    function formatRuntime(minutes) {
        if (!minutes) return "TBD";
        const h = Math.floor(minutes / 60);
        const m = minutes % 60;
        return `${h} ${h === 1 ? 'hour' : 'hours'} and ${m} mins`;
    }

    async function syncWithTMDB() {
        const btn = document.getElementById('updateBtn');
        const spinner = document.getElementById('spinner');
        btn.disabled = true;
        spinner.style.display = "inline-block";

        try {
            // 1. Fetch the MCU Movie List
            const listRes = await fetch(`https://api.themoviedb.org/3/list/${LIST_ID}?api_key=${API_KEY}`);
            const listData = await listRes.json();
            
            const moviePromises = listData.items.map(async (item) => {
                // 2. Deep Dive for Details (Runtime & Videos)
                const detailRes = await fetch(`https://api.themoviedb.org/3/movie/${item.id}?api_key=${API_KEY}&append_to_response=videos`);
                const d = await detailRes.json();
                
                // Find YouTube Trailer
                const trailerObj = d.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                const trailerUrl = trailerObj ? `https://www.youtube.com/watch?v=${trailerObj.key}` : "No Trailer Found";

                return {
                    title: d.title,
                    year: d.release_date ? new Date(d.release_date).getFullYear() : "TBD",
                    rating: d.adult ? "R" : "PG-13",
                    runtime: formatRuntime(d.runtime),
                    genres: d.genres.map(g => g.name).join(", "),
                    source: "Theaters / Disney+",
                    summary: d.overview,
                    trailer: trailerUrl
                };
            });

            mcuData = await Promise.all(moviePromises);
            mcuData.sort((a, b) => b.year - a.year); // Newest first
            
            render(mcuData);
            document.getElementById('counterNote').innerHTML = `Verified: <strong>${mcuData.length} Projects</strong> synced from Global Database.`;
            btn.innerHTML = "✅ SYNC COMPLETE";
            setTimeout(() => { 
                btn.innerHTML = "🔄 SYNC LIVE DATA"; 
                btn.disabled = false;
                spinner.style.display = "none";
            }, 3000);

        } catch (error) {
            console.error(error);
            alert("Connection Error: Check API Key");
            btn.disabled = false;
            spinner.style.display = "none";
        }
    }

    function render(list) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';
        list.forEach((m) => {
            grid.innerHTML += `
                <div class="movie-card p-3" onclick="openDetail('${m.title.replace(/'/g, "\\'")}')">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">${m.title}</h5>
                        <span class="badge bg-dark">${m.year}</span>
                    </div>
                </div>`;
        });
    }

    function openDetail(title) {
        const m = mcuData.find(item => item.title === title);
        const layout = `Movie: ${m.title}
Year: ${m.year}
Rating: ${m.rating}
Runtime: ${m.runtime}
Genres: ${m.genres}
Source: ${m.source}

Summary: ${m.summary}
Trailer: ${m.trailer}`;
        
        document.getElementById('mTitle').innerText = m.title;
        document.getElementById('mDetails').innerText = layout;
        document.getElementById('mLink').href = m.trailer;
        new bootstrap.Modal(document.getElementById('movieModal')).show();
    }

    // Filter Logic
    document.getElementById('movieSearch').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        render(mcuData.filter(m => m.title.toLowerCase().includes(val) || m.year.toString().includes(val)));
    });

</script>
</body>
</html>
